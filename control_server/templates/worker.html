<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body class="bg-gray-900 text-white font-sans min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
      <a
        href="/dashboard"
        class="text-blue-400 hover:underline mb-4 inline-block"
        >← Back to Dashboard</a
      >

      <div
        class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg mb-6"
      >
        <div
          class="flex justify-between items-start mb-6 border-b border-gray-700 pb-4"
        >
          <div>
            <h1 class="text-2xl font-bold text-blue-400" id="w-hostname">
              Loading...
            </h1>
            <p class="text-gray-400 text-sm font-mono mt-1">ID: {{ wid }}</p>
          </div>
          <span
            id="w-status"
            class="px-3 py-1 rounded-full text-sm font-bold bg-gray-700 text-gray-300"
            >WAITING</span
          >
        </div>

        <div class="grid grid-cols-2 gap-4 text-sm">
          <div>
            <span class="text-gray-500 block">OS Environment</span
            ><span id="w-os" class="font-medium text-gray-200"></span>
          </div>
          <div>
            <span class="text-gray-500 block">CPU Config</span
            ><span id="w-cpu" class="font-medium text-gray-200"></span>
          </div>
          <div>
            <span class="text-gray-500 block">RAM / Cores</span
            ><span id="w-ram" class="font-medium text-gray-200"></span>
          </div>
          <div>
            <span class="text-gray-500 block">IP Address</span
            ><span
              id="w-ip"
              class="font-medium text-purple-400 font-mono"
            ></span>
          </div>
        </div>

        <div
          class="grid grid-cols-3 gap-4 mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700"
        >
          <div class="text-center">
            <div class="text-xs text-gray-500 uppercase">Benchmark</div>
            <div class="text-2xl font-mono text-blue-400" id="w-bench">0</div>
          </div>
          <div class="text-center">
            <div class="text-xs text-gray-500 uppercase">Total Tasks</div>
            <div class="text-2xl font-mono text-green-400" id="w-tasks">0</div>
          </div>
          <div class="text-center">
            <div class="text-xs text-gray-500 uppercase">Total Points</div>
            <div class="text-2xl font-mono text-yellow-400" id="w-pts">0</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const WID = "{{ wid }}";

      async function fetchWorker() {
        const res = await fetch("/api/system_stats");
        const data = await res.json();
        const w = data.workers.find((x) => x.worker_id === WID);

        if (!w) return;

        document.getElementById("w-hostname").innerText = w.hostname;
        document.getElementById("w-os").innerText = w.os;
        document.getElementById("w-cpu").innerText = w.cpu;
        document.getElementById("w-ram").innerText =
          `${w.ram} (${w.cores} Cores)`;
        document.getElementById("w-ip").innerText = w.ip;
        document.getElementById("w-bench").innerText = w.benchmark_score;
        document.getElementById("w-tasks").innerText = w.total_tasks;
        document.getElementById("w-pts").innerText = Math.floor(
          w.total_points,
        ).toLocaleString();

        const statusEl = document.getElementById("w-status");
        statusEl.innerText = w.status.toUpperCase();
        if (w.status === "offline")
          statusEl.className =
            "px-3 py-1 rounded-full text-sm font-bold bg-red-500 text-white";
        else if (w.status === "busy")
          statusEl.className =
            "px-3 py-1 rounded-full text-sm font-bold bg-yellow-500 text-white";
        else
          statusEl.className =
            "px-3 py-1 rounded-full text-sm font-bold bg-green-500 text-white";
      }

      setInterval(fetchWorker, 1000);
      fetchWorker();
    </script>
  </body>
</html>
