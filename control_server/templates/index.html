<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Volunteer Cloud | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-blue-400">☁️ Volunteer Cloud Controller</h1>
            <button onclick="generateTasks()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-semibold transition">Generate Workload</button>
        </div>

        <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wide">Connected Workers</p>
                <p class="text-3xl font-bold text-green-400" id="stat-workers">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wide">Tasks (Running/Q)</p>
                <p class="text-3xl font-bold text-blue-400" id="stat-tasks">0 / 0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wide">Total System Points</p>
                <p class="text-3xl font-bold text-yellow-400" id="stat-points">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wide">Faults / Requeues</p>
                <p class="text-3xl font-bold text-red-400" id="stat-faults">0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <div class="col-span-2 bg-gray-800 rounded-lg border border-gray-700 p-4">
                <h2 class="text-xl font-semibold mb-4 text-gray-200">Live Worker Fleet</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-400 border-b border-gray-700">
                            <tr>
                                <th class="pb-2">Node</th>
                                <th class="pb-2">Status</th>
                                <th class="pb-2">Bench</th>
                                <th class="pb-2">Current Task Progress</th>
                                <th class="pb-2">Points</th>
                                <th class="pb-2">Action</th>
                            </tr>
                        </thead>
                        <tbody id="worker-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
                <h2 class="text-xl font-semibold mb-4 text-gray-200">Active Queue</h2>
                <div id="task-queue" class="space-y-3 h-96 overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 space-y-2"></div>

    <script>
        let knownWorkers = new Set();
        let faultCount = 0;

        function showToast(msg, isError=false) {
            const t = document.createElement('div');
            t.className = `p-4 rounded shadow-lg text-white font-medium transition-opacity ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(), 300); }, 3000);
        }

        async function generateTasks() {
            await fetch('/api/generate_tasks', {method: 'POST'});
            fetchData();
        }

        async function fetchData() {
            const res = await fetch('/api/system_stats');
            const data = await res.json();
            
            // Stats
            const online = data.workers.filter(w => w.status !== 'offline');
            const running = data.tasks.filter(t => t.status === 'running');
            const queued = data.tasks.filter(t => t.status === 'queued');
            const completed = data.tasks.filter(t => t.status === 'completed');
            const pts = data.workers.reduce((acc, w) => acc + w.total_points, 0);
            
            faultCount = data.tasks.reduce((acc, t) => acc + t.retries_count, 0);

            document.getElementById('stat-workers').innerText = online.length;
            document.getElementById('stat-tasks').innerText = `${running.length} / ${queued.length}`;
            document.getElementById('stat-points').innerText = Math.floor(pts).toLocaleString();
            document.getElementById('stat-faults').innerText = faultCount;

            // Worker Table
            const tbody = document.getElementById('worker-table-body');
            tbody.innerHTML = '';
            data.workers.forEach(w => {
                if(!knownWorkers.has(w.worker_id)) {
                    knownWorkers.add(w.worker_id);
                    if(w.status === 'online' || w.status === 'busy') showToast(`New Node Online: ${w.hostname} (Score: ${w.benchmark_score})`);
                }

                let statusBadge = w.status === 'offline' ? 'bg-red-500' : (w.status === 'busy' ? 'bg-yellow-500' : 'bg-green-500');
                let taskHtml = `<span class="text-gray-500">Idle</span>`;
                
                if(w.current_task) {
                    const t = data.tasks.find(ts => ts.task_id === w.current_task);
                    if(t) taskHtml = `
                        <div class="text-xs mb-1">${t.task_type}</div>
                        <div class="w-full bg-gray-700 rounded-full h-2"><div class="bg-blue-500 h-2 rounded-full transition-all" style="width: ${t.progress}%"></div></div>
                    `;
                }

                tbody.innerHTML += `
                    <tr class="border-b border-gray-700/50 hover:bg-gray-700/20">
                        <td class="py-3 font-medium text-gray-200">${w.hostname}<br><span class="text-xs text-gray-500">${w.worker_id}</span></td>
                        <td><span class="px-2 py-1 text-xs rounded-full ${statusBadge} text-white">${w.status.toUpperCase()}</span></td>
                        <td class="text-purple-400 font-mono">${w.benchmark_score}</td>
                        <td class="w-1/3 pr-4">${taskHtml}</td>
                        <td class="text-yellow-400 font-mono">${Math.floor(w.total_points)}</td>
                        <td><a href="/worker/${w.worker_id}" class="text-blue-400 hover:underline text-xs">Details →</a></td>
                    </tr>
                `;
            });

            // Task Queue
            const q = document.getElementById('task-queue');
            q.innerHTML = '';
            [...running, ...queued].forEach(t => {
                q.innerHTML += `
                    <div class="bg-gray-700 p-3 rounded border-l-4 ${t.status==='running' ? 'border-yellow-500':'border-blue-500'}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-semibold text-sm">${t.task_type}</span>
                            <span class="text-xs text-gray-400">${t.status}</span>
                        </div>
                        <div class="text-xs text-gray-400">ID: ${t.task_id} | Retries: <span class="${t.retries_count>0?'text-red-400':''}">${t.retries_count}</span></div>
                    </div>
                `;
            });
        }

        setInterval(fetchData, 1000);
        fetchData();
    </script>
</body>
</html>
